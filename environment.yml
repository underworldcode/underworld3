name: uw3
channels:
  - conda-forge
dependencies:
  - python=3.11
  - compilers
  - mpich
  - petsc=3.21.5
  - petsc4py=3.21.5
  - cython=3.*
  - mpmath<=1.3
  - mesalib
  - pyvista
  - pytest
  - numpy<2
  - scipy
  - sympy
  - ipython
  - mpi4py
